ServerName localhost

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule headers_module modules/mod_headers.so

DocumentRoot "/usr/local/apache2/htdocs"

# Proxy PHP API requests to the FPM container
<Location "/TAIPO/api">
    ProxyPass "fcgi://app:9000/var/www/html/backend/public/index.php"
</Location>

# Proxy WebSocket for Vite HMR
<Location "/TAIPO/@vite/client">
    ProxyPass "ws://frontend:5173/TAIPO/@vite/client"
</Location>

# Proxy everything else to the Vite dev server
<Location "/TAIPO">
    ProxyPass "http://frontend:5173/TAIPO"
    ProxyPassReverse "http://frontend:5173/TAIPO"
</Location>

# General PHP support
<FilesMatch \.php$>
    SetHandler "proxy:fcgi://app:9000"
</FilesMatch>

# Log configuration
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 common
