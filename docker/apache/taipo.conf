ServerName localhost

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule headers_module modules/mod_headers.so

DocumentRoot "/usr/local/apache2/htdocs"

# Serve the frontend from /TAIPO/
Alias /TAIPO "/usr/local/apache2/htdocs/frontend"
<Directory "/usr/local/apache2/htdocs/frontend">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.html
</Directory>

# Proxy PHP API requests to the FPM container
# Assuming the API is reachable at /TAIPO/api/
<Location "/TAIPO/api">
    ProxyPass "fcgi://app:9000/var/www/html/backend/public/index.php"
</Location>

# General PHP support for other files if needed
<FilesMatch \.php$>
    SetHandler "proxy:fcgi://app:9000"
</FilesMatch>

# Log configuration
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 common
